- name: Optimize Kernel for High-Traffic Proxy with Large Objects
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    # ===== CONNECTION QUEUE DEPTH =====
    # Accept backlog for new connections - prevents "Connection Refused" during bursts
    - { name: 'net.core.somaxconn', value: '4096' }

    # ===== FILE DESCRIPTORS =====
    # System-wide file descriptor limit (Squid needs 2 FDs per connection)
    - { name: 'fs.file-max', value: '2097152' }

    # ===== TCP BUFFER TUNING (Critical for 5MB+ Objects) =====
    # Maximum socket receive/send buffer sizes (16MB for large API responses)
    - { name: 'net.core.rmem_max', value: '16777216' }
    - { name: 'net.core.wmem_max', value: '16777216' }
    # TCP auto-tuning: min, default, max (enables TCP window scaling)
    - { name: 'net.ipv4.tcp_rmem', value: '4096 87380 16777216' }
    - { name: 'net.ipv4.tcp_wmem', value: '4096 65536 16777216' }

    # ===== CONNECTION TRACKING (Moderate Scale) =====
    # Maximum tracked connections (enough for ~10k concurrent + established)
    - { name: 'net.netfilter.nf_conntrack_max', value: '262144' }
    # Hash table size (max / 4)
    - { name: 'net.netfilter.nf_conntrack_buckets', value: '65536' }
    # Close tracked connections after 1 hour idle (default 5 days is too long)
    - { name: 'net.netfilter.nf_conntrack_tcp_timeout_established', value: '3600' }

    # ===== EPHEMERAL PORT RANGE =====
    # Expand available ports for outgoing connections (Squid → API servers)
    - { name: 'net.ipv4.ip_local_port_range', value: '10000 65535' }

    # ===== TIME_WAIT SOCKET REUSE =====
    # Allow reuse of sockets in TIME_WAIT for new outgoing connections
    # Safe because Squid controls both ends (client ← Squid → origin)
    - { name: 'net.ipv4.tcp_tw_reuse', value: '1' }
    # Faster cleanup of FIN_WAIT connections
    - { name: 'net.ipv4.tcp_fin_timeout', value: '15' }

    # ===== MEMORY MANAGEMENT =====
    # Minimize swapping (Squid's 512MB RAM cache must stay in RAM!)
    - { name: 'vm.swappiness', value: '1' }
    # Dirty page ratios (prevent memory cache from blocking on disk I/O)
    - { name: 'vm.dirty_ratio', value: '10' }
    - { name: 'vm.dirty_background_ratio', value: '5' }

    # ===== TCP PERFORMANCE =====
    # Enable TCP window scaling (required for BDP > 64KB, i.e., large objects)
    - { name: 'net.ipv4.tcp_window_scaling', value: '1' }
    # Enable selective acknowledgments (improves retransmission efficiency)
    - { name: 'net.ipv4.tcp_sack', value: '1' }
    # Disable slow start after idle (keep connection fast for cache hits)
    - { name: 'net.ipv4.tcp_slow_start_after_idle', value: '0' }

    # ===== NETWORK DEVICE QUEUE =====
    # Increase network device backlog (handles bursts from microservices)
    - { name: 'net.core.netdev_max_backlog', value: '5000' }

# ===== TRANSPARENT HUGEPAGES =====
# Disable THP to prevent memory compaction latency spikes in Squid's cache
- name: Disable Transparent HugePages (THP)
  shell: |
    echo never > /sys/kernel/mm/transparent_hugepage/enabled
    echo never > /sys/kernel/mm/transparent_hugepage/defrag
  changed_when: false

- name: Persist THP settings across reboots
  lineinfile:
    path: /etc/rc.local
    line: "{{ item }}"
    create: yes
    mode: '0755'
  loop:
    - "#!/bin/bash"
    - "echo never > /sys/kernel/mm/transparent_hugepage/enabled"
    - "echo never > /sys/kernel/mm/transparent_hugepage/defrag"

# ===== FILE DESCRIPTOR LIMITS FOR SQUID USER =====
- name: Set ulimits for proxy user (Squid runs as 'proxy')
  pam_limits:
    domain: proxy
    limit_type: "{{ item.type }}"
    limit_item: "{{ item.item }}"
    value: "{{ item.value }}"
  loop:
    - { type: 'soft', item: 'nofile', value: '65536' }
    - { type: 'hard', item: 'nofile', value: '65536' }
    - { type: 'soft', item: 'nproc', value: '32768' }
    - { type: 'hard', item: 'nproc', value: '32768' }

# ===== CONNTRACK MODULE PARAMETERS =====
# Set conntrack buckets at boot (can only be set when module loads)
- name: Configure conntrack buckets at module load
  lineinfile:
    path: /etc/modprobe.d/nf_conntrack.conf
    line: "options nf_conntrack hashsize=65536"
    create: yes
    mode: '0644'

# Reload conntrack module with new settings
- name: Reload nf_conntrack module
  community.general.modprobe:
    name: nf_conntrack
    state: present
    params: 'hashsize=65536'
  ignore_errors: yes

# ===== SYSTEM UPDATES =====
- name: Update package cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install required system packages
  apt:
    name:
      - sysstat          # Performance monitoring (sar, iostat)
      - net-tools        # Network utilities (netstat)
      - tcpdump          # Packet capture for debugging
      - htop             # Process monitoring
      - iotop            # I/O monitoring
    state: present