apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-microservice
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springboot-microservice
  template:
    metadata:
      labels:
        app: springboot-microservice
    spec:
      containers:
      - name: app
        image: your-springboot-app:latest
        ports:
        - containerPort: 8080

        env:
        # Proxy configuration
        - name: HTTP_PROXY
          value: "http://squid-proxy.squid-namespace.svc.cluster.local:3128"
        - name: HTTPS_PROXY
          value: "http://squid-proxy.squid-namespace.svc.cluster.local:3128"
        - name: NO_PROXY
          value: "localhost,127.0.0.1,.svc.cluster.local"

        # JVM proxy settings (Spring Boot will use these)
        - name: JAVA_TOOL_OPTIONS
          value: >-
            -Dhttp.proxyHost=squid-proxy.squid-namespace.svc.cluster.local
            -Dhttp.proxyPort=3128
            -Dhttps.proxyHost=squid-proxy.squid-namespace.svc.cluster.local
            -Dhttps.proxyPort=3128
            -Dhttp.nonProxyHosts=localhost|127.0.0.1|*.svc.cluster.local
            -Djavax.net.ssl.trustStore=/app/truststore/squid-truststore.jks
            -Djavax.net.ssl.trustStorePassword=changeit
            -Djavax.net.ssl.trustStoreType=JKS

        # Alternative: Use custom truststore alongside system truststore
        # - name: SPRING_PROFILES_ACTIVE
        #   value: "squid-proxy"

        volumeMounts:
        # Mount the CA certificate
        - name: squid-ca
          mountPath: /etc/ssl/certs/squid-ca.crt
          subPath: squid-ca.crt
          readOnly: true

        # Mount the generated truststore (created in initContainer)
        - name: truststore
          mountPath: /app/truststore
          readOnly: true

        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

      # Init container to create JKS truststore from the CA cert
      initContainers:
      - name: create-truststore
        image: eclipse-temurin:21-jdk  # Use same Java version as your app
        command:
        - sh
        - -c
        - |
          set -e
          echo "Creating truststore with Squid CA certificate..."

          # Copy system truststore as base
          cp $JAVA_HOME/lib/security/cacerts /truststore/squid-truststore.jks
          chmod 644 /truststore/squid-truststore.jks

          # Import Squid CA certificate
          keytool -import -trustcacerts \
            -alias squid-ca \
            -file /etc/ssl/certs/squid-ca.crt \
            -keystore /truststore/squid-truststore.jks \
            -storepass changeit \
            -noprompt

          echo "Truststore created successfully"
          keytool -list -keystore /truststore/squid-truststore.jks -storepass changeit | grep squid-ca
        volumeMounts:
        - name: squid-ca
          mountPath: /etc/ssl/certs/squid-ca.crt
          subPath: squid-ca.crt
          readOnly: true
        - name: truststore
          mountPath: /truststore

      volumes:
      - name: squid-ca
        configMap:
          name: squid-ca-cert
          items:
          - key: squid-ca.crt
            path: squid-ca.crt

      # EmptyDir for the generated truststore
      - name: truststore
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: springboot-microservice
  namespace: default
spec:
  selector:
    app: springboot-microservice
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
